<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — It's in the Core</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Jost',sans-serif;background:linear-gradient(145deg,#2E1A20,#3A2430,#2A3828);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem}
.wrap{max-width:480px}
.num{font-family:'Playfair Display',serif;font-size:8rem;font-weight:400;color:rgba(242,196,206,.15);line-height:1;margin-bottom:1rem}
h1{font-family:'Playfair Display',serif;font-size:2rem;font-weight:400;font-style:italic;color:#F2C4CE;margin-bottom:1rem}
p{font-size:.95rem;color:rgba(250,246,239,.5);line-height:1.75;font-weight:300;margin-bottom:2.5rem}
a{display:inline-block;background:#C4607A;color:#fff;padding:.85rem 2.5rem;border-radius:3px;text-decoration:none;font-size:.75rem;letter-spacing:.12em;text-transform:uppercase;font-weight:500;transition:background .3s}
a:hover{background:#D98EA0}
</style>
</head>
<body>
<div class="wrap">
  <div class="num">404</div>
  <h1>This page has shifted.</h1>
  <p>The page you're looking for isn't here — but the Word of God always is. Let's get you back on solid ground.</p>
  <a href="/">Back to Home</a>
</div>
</body>
</html>
